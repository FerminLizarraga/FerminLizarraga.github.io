<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBPSL</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f172a;
      color:white;
      font-family:Arial, sans-serif;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      text-align:center;
      padding:50px;
      border-radius:24px;
      background:#111827;
      border:1px solid #334155;
      max-width:700px;
      width:90%;
    }

    h1{
      font-size:60px;
      margin-bottom:20px;
    }

    p{
      color:#94a3b8;
      font-size:20px;
    }

    .button{
      display:inline-block;
      margin-top:30px;
      padding:14px 28px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:12px;
      transition:0.2s;
    }

    .button:hover{
      opacity:0.85;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>IBPSL</h1>

    <p>
      Web publicada gratis con GitHub Pages 🚀
    </p>

    <a class="button" href="#">
      Empezar
    </a>
  </div>

</body>
</html>

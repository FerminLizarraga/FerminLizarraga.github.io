<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBPSL</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0b1220;
      color:white;
    }

    /* HERO */
    .hero{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      overflow:hidden;
    }

    .hero img{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      filter:brightness(0.5);
    }

    .content{
      position:relative;
      text-align:center;
      padding:20px;
    }

    .content h1{
      font-size:60px;
      letter-spacing:2px;
    }

    .content p{
      margin-top:15px;
      color:#cbd5e1;
      font-size:18px;
    }

    /* BOTÓN opcional */
    .btn{
      display:inline-block;
      margin-top:25px;
      padding:12px 24px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition:0.2s;
    }

    .btn:hover{
      background:#1d4ed8;
    }

    @media(max-width:768px){
      .content h1{
        font-size:38px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <img src="portada.jpg" alt="Portada">

    <div class="content">
      <h1>IBPSL</h1>
      <p>Diseño web moderno y minimalista</p>

      <!-- puedes borrar este botón si quieres aún más limpio -->
      <a class="btn" href="#">Entrar</a>
    </div>
  </section>

</body>
</html>
